<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Lock Box </title>
<style>
    /* Font Nunito bo tròn, đáng yêu, hỗ trợ tiếng Việt trọn vẹn */
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');

    :root {
      /* Bảng màu Pastel dịu nhẹ (Soft Pastels) làm nền nút */
      --c-mint-soft: #bbf7d0;   --c-mint-dark: #059669; /* Xanh Mint nhạt & đậm */
      --c-pink-soft: #fbcfe8;   --c-pink-dark: #db2777; /* Hồng nhạt & đậm */
      --c-yellow-soft: #fef08a; --c-yellow-dark: #ca8a04; /* Vàng nhạt & đậm */
      --c-purple-soft: #e9d5ff; --c-purple-dark: #7c3aed; /* Tím nhạt & đậm */
      --c-blue-soft: #bfdbfe;   --c-blue-dark: #2563eb; /* Xanh dương nhạt & đậm */
      
      --white: #ffffff;
      --text-dark: #1e293b; 
      --text-muted: #64748b;
      
      /* Bóng đổ mềm mại cho khối trắng */
      --shadow-card: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    body {
      font-family: 'Nunito', sans-serif;
      /* Nền Gradient Pastel siêu nhạt, thanh lịch và tinh tế */
      background: linear-gradient(135deg, #f6f0ff 0%, #eef5ff 100%);
      margin: 0; padding: 20px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; box-sizing: border-box;
      color: var(--text-dark);
    }

    /* --- 1. FORM ĐĂNG NHẬP --- */
    #loginScreen {
      width: 100%; max-width: 400px; 
      background: var(--white) !important;
      padding: 45px 30px !important; 
      border-radius: 28px;
      box-shadow: var(--shadow-card) !important;
      border-top: 8px solid var(--c-purple-soft); 
      text-align: center; margin: auto !important; box-sizing: border-box;
    }
    #loginScreen h1 { font-size: 26px; margin-bottom: 5px; font-weight: 900; color: var(--text-dark);}
    #loginScreen p { color: var(--text-muted); margin-bottom: 25px; font-weight: 700;}
    #passInput { margin-bottom: 24px !important; }
    
    #loginScreen .btn { 
      background: var(--c-purple-soft) !important; 
      color: var(--c-purple-dark) !important; 
      box-shadow: 0 6px 0 rgba(124, 58, 237, 0.3) !important; 
    }

    /* --- 2. BẢNG ĐIỀU KHIỂN CHÍNH (Giao diện Mobile) --- */
    .container { width: 100%; max-width: 480px; box-sizing: border-box; }
    #dashboardScreen { display: none; margin-top: 0; }
    #dashboardScreen.container { background: transparent !important; padding: 0 !important; box-shadow: none !important; }

    /* Khối 1: Tiêu đề */
    #dashboardScreen h1 {
      background: var(--white); margin: 0; padding: 30px 20px 5px;
      border-radius: 24px 24px 0 0; border-left: 8px solid var(--c-purple-soft);
      font-size: 26px; text-align: center; font-weight: 900; color: var(--text-dark);
    }
    #dashboardScreen p {
      background: var(--white); margin: 0 0 25px 0; padding: 5px 20px 30px;
      border-radius: 0 0 24px 24px; border-left: 8px solid var(--c-purple-soft);
      color: var(--text-muted); font-weight: 700; text-align: center; box-shadow: var(--shadow-card);
    }

    /* Khối nút Mở/Khóa ngang hàng */
    .btn-open { 
      width: 48%; float: left; margin-bottom: 25px !important; 
      background: var(--c-mint-soft) !important; 
      color: var(--c-mint-dark) !important; 
      box-shadow: 0 6px 0 rgba(5, 150, 105, 0.3) !important; 
    }
    .btn-lock { 
      width: 48%; float: right; margin-bottom: 25px !important; 
      background: var(--c-pink-soft) !important; 
      color: var(--c-pink-dark) !important; 
      box-shadow: 0 6px 0 rgba(219, 39, 119, 0.3) !important; 
    }

    /* Khối 2: Thanh hẹn giờ */
    .btn-lock + .flex-row {
      clear: both; 
      background: var(--white); padding: 15px; border-radius: 24px;
      margin: 0 0 25px 0 !important; border-left: 8px solid var(--c-yellow-soft); 
      box-shadow: var(--shadow-card); align-items: center;
    }
    #timerInput { margin: 0 !important; flex: 1.5; }
    .btn-timer { 
      margin: 0 !important; flex: 1; 
      background: var(--c-yellow-soft) !important; 
      color: var(--c-yellow-dark) !important; 
      box-shadow: 0 5px 0 rgba(202, 138, 4, 0.3) !important; 
    }

    /* Khối 3 & 4: Đồng hồ và Trạng thái */
    .countdown-display {
      background: var(--white); padding: 25px 20px; margin: 0 0 15px 0 !important;
      border-radius: 24px; border-left: 8px solid var(--c-pink-soft); box-shadow: var(--shadow-card);
      color: #be123c !important; text-align: center; font-weight: 900; font-size: 42px; 
    }
    #statusBox {
      background: var(--white); padding: 20px; margin: 0 0 25px 0 !important;
      border-radius: 24px !important; border-left: 8px solid var(--c-blue-soft); box-shadow: var(--shadow-card);
      color: var(--text-muted); text-align: center; font-weight: 800; font-size: 15px;
    }

    /* Khối 5: Đổi mật khẩu */
    #statusBox + .card-title {
      background: var(--white); padding: 25px 25px 5px; margin: 0 !important;
      border-radius: 24px 24px 0 0; border-left: 8px solid var(--c-purple-soft);
      color: var(--text-dark); font-weight: 900; font-size: 17px; box-sizing: border-box;
    }
    .card-title + .flex-row {
      background: var(--white); padding: 10px 20px 25px; margin: 0 0 25px 0 !important;
      border-radius: 0 0 24px 24px; border-left: 8px solid var(--c-purple-soft);
      box-shadow: var(--shadow-card); align-items: center; box-sizing: border-box;
    }
    #newPassInput { margin: 0 !important; flex: 1.5; }
    .card-title + .flex-row .btn { 
      background: var(--c-purple-soft) !important; 
      color: var(--c-purple-dark) !important; 
      box-shadow: 0 5px 0 rgba(124, 58, 237, 0.3) !important; 
      margin: 0 !important; flex: 1; 
    }

    /* Khối 6: Lịch sử hoạt động */
    .card-title:last-of-type {
      background: var(--white); padding: 25px 25px 5px; margin: 0 !important;
      border-radius: 24px 24px 0 0; border-left: 8px solid var(--c-mint-soft);
      color: var(--text-dark); font-weight: 900; font-size: 17px; box-sizing: border-box;
    }
    #historyList {
      background: var(--white); padding: 5px 20px 25px; margin: 0;
      border-radius: 0 0 24px 24px; border-left: 8px solid var(--c-mint-soft);
      box-shadow: var(--shadow-card); list-style: none; max-height: 200px; overflow-y: auto; text-align: left; box-sizing: border-box;
    }
    #historyList li { padding: 15px 5px; border-bottom: 2px dashed #cbd5e1; font-size: 14px; color: var(--text-muted); font-weight: 800; }
    #historyList li:last-child { border-bottom: none; }

    /* --- STYLE CHUNG: NÚT BẤM VÀ Ô NHẬP --- */
    .flex-row { display: flex; gap: 15px; align-items: stretch; }
    
    .btn {
      width: 100%; padding: 16px; font-size: 14px; font-weight: 900 !important; 
      border: none; border-radius: 18px; cursor: pointer; 
      text-transform: uppercase; letter-spacing: 0.5px;
      transition: all 0.1s ease; 
      transform: translateY(0);
      font-family: 'Nunito', sans-serif;
    }
    .btn:hover { filter: brightness(1.03); }
    .btn:active { transform: translateY(6px); box-shadow: 0 0px 0px rgba(0,0,0,0) !important; }

    input {
      width: 100%; padding: 16px; border-radius: 18px; font-size: 16px; text-align: center; font-weight: 800; color: var(--text-dark) !important;
      background: #f8fafc; border: 2px solid #cbd5e1;
      box-sizing: border-box; outline: none; box-shadow: none !important; transition: all 0.3s; font-family: 'Nunito', sans-serif;
    }
    input:focus { border-color: var(--c-purple-soft); background: var(--white); }
    
    #historyList::-webkit-scrollbar { width: 8px; }
    #historyList::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }


    /* =======================================================
       3. RESPONSIVE BỐ CỤC PC / LAPTOP (Chia 2 cột) 
       ======================================================= */
    @media (min-width: 800px) {
      /* Mở rộng khung giới hạn để đủ chỗ cho 2 cột */
      #dashboardScreen.container {
        max-width: 900px !important;
        column-count: 2; /* Chia thành 2 cột */
        column-gap: 30px; /* Khoảng cách giữa 2 cột */
      }
      
      /* Tiêu đề "Smart Lock Box" trải dài trên cả 2 cột để làm header */
      #dashboardScreen h1, 
      #dashboardScreen p {
        column-span: all;
        -webkit-column-span: all;
      }
      
      /* CÚ CHỐT: Yêu cầu khối "Đổi Mật Khẩu Web" nhảy sang bắt đầu cột bên phải */
      #statusBox + .card-title {
        break-before: column;
        -webkit-column-break-before: always;
      }

      /* Khóa các khối giao diện lại để chúng không bị gãy đôi giữa 2 cột */
      .btn-open, .btn-lock, .flex-row, .countdown-display, #statusBox, .card-title, #historyList {
        break-inside: avoid;
        -webkit-column-break-inside: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

  <div class="container" id="loginScreen">
    <h1>Bảo Mật Hệ Thống</h1>
    <p>Đang tải cấu hình bảo mật</p>
    <input type="password" id="passInput" placeholder="Nhập mật khẩu Web">
    <button class="btn" onclick="checkLogin()">🔓 Đăng Nhập</button>
    <div class="status" id="loginStatus" style="display:none; color: var(--danger);">Sai mật khẩu!</div>
  </div>

  <div class="container" id="dashboardScreen">
    <h1>Smart Lock Box</h1>
    <p>Bảng điều khiển & Hẹn giờ từ xa</p>
    
    <button class="btn btn-open" onclick="manualOpen()">🔓 MỞ KHÓA HỘP</button>
    <button class="btn btn-lock" onclick="manualLock()">🔒 KHÓA HỘP</button>
    
    <div class="flex-row" style="margin-top: 10px;">
      <input type="number" id="timerInput" placeholder="Số phút khóa" style="margin-bottom: 0;">
      <button class="btn btn-timer" style="margin: 0;" onclick="startWebTimer()">⏳ HẸN GIỜ</button>
    </div>

    <div class="countdown-display" id="countdownBox">00:00</div>
    
    <div class="status" id="statusBox">Đang chờ lệnh...</div>

    <div class="card-title">⚙️ Đổi Mật Khẩu Web</div>
    <div class="flex-row" style="margin-top: 15px;">
      <input type="password" id="newPassInput" placeholder="Pass mới" style="margin-bottom: 0;">
      <button class="btn" style="margin: 0; font-size: 12px;" onclick="changePassword()">💾 Lưu Pass</button>
    </div>

    <div class="card-title">📜 Lịch sử hoạt động</div>
    <ul class="history-list" id="historyList"><li>Đang tải...</li></ul>
  </div>

  <script>
    const DATABASE_URL = "https://lockbox-38ce7-default-rtdb.asia-southeast1.firebasedatabase.app";
    const FIREBASE_SECRET = "AO6RURBZ6wwZEyAgRlJU1SdiZCOVZpMbvPotT3sg";
    let cloudPassword = "1234"; // Mật khẩu dự phòng nếu Firebase trống
    let timerInterval = null;   // Biến quản lý bộ đếm thời gian ngầm

    // Tải mật khẩu từ Cloud khi vừa mở trang Web
    window.onload = function() {
      fetch(`${DATABASE_URL}/lockbox/password.json?auth=${FIREBASE_SECRET}`)
        .then(res => res.json())
        .then(data => {
          if (data !== null) cloudPassword = String(data);
          document.querySelector('#loginScreen p').innerText = "Hệ thống bảo mật sẵn sàng!";
        });
    }

    // Xử lý đăng nhập
    function checkLogin() {
      const pass = document.getElementById('passInput').value;
      if (pass === cloudPassword) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';
        loadHistory(); 
      } else {
        document.getElementById('loginStatus').style.display = 'block';
        setTimeout(() => document.getElementById('loginStatus').style.display = 'none', 2000);
      }
    }

    // Hàm cốt lõi gửi chuỗi lên Firebase
    function sendRawCommand(cmd, callback) {
      fetch(`${DATABASE_URL}/lockbox/command.json?auth=${FIREBASE_SECRET}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(cmd)
      }).then(res => {
        if (res.ok && callback) callback();
      });
    }

    // Bấm nút Mở thủ công
    function manualOpen() {
      clearInterval(timerInterval); // Hủy bộ đếm ngược nếu đang chạy hẹn giờ
      document.getElementById('countdownBox').style.display = 'none';
      document.getElementById('statusBox').innerText = "Đang gửi lệnh mở...";
      
      sendRawCommand("OPEN", () => {
        document.getElementById('statusBox').innerText = "✅ Đã mở khóa thành công!";
        logHistory("MỞ KHÓA");
      });
    }

    // Bấm nút Khóa thủ công
    function manualLock() {
      clearInterval(timerInterval);
      document.getElementById('countdownBox').style.display = 'none';
      document.getElementById('statusBox').innerText = "Đang gửi lệnh khóa...";
      
      sendRawCommand("LOCK", () => {
        document.getElementById('statusBox').innerText = "🔒 Đã khóa vô thời hạn!";
        logHistory("KHÓA THƯỜNG");
      });
    }

    // CHỨC NĂNG CHÍ MẠNG: HẸN GIỜ TRÊN WEB (ĐÁNH LỪA PHẦN CỨNG)
    function startWebTimer() {
      clearInterval(timerInterval); // Xóa bộ đếm cũ nếu có
      
      const minutes = parseInt(document.getElementById('timerInput').value);
      if (isNaN(minutes) || minutes <= 0) {
        alert("Vui lòng nhập số phút hợp lệ lớn hơn 0!");
        return;
      }

      document.getElementById('statusBox').innerText = `⏳ Đang kích hoạt khóa hẹn giờ...`;
      
      // Bước 1: Ra lệnh KHÓA cho phần cứng trước
      sendRawCommand("LOCK", () => {
        document.getElementById('statusBox').innerText = `🔒 Trạng thái: Đang khóa bằng Web Timer`;
        logHistory(`HẸN GIỜ KHÓA ${minutes} PHÚT`);
        
        // Bước 2: Bật đồng hồ đếm ngược trên giao diện Web
        let totalSeconds = minutes * 60;
        const countdownBox = document.getElementById('countdownBox');
        countdownBox.style.display = 'block';
        
        // Cập nhật giao diện đếm ngược mỗi giây
        timerInterval = setInterval(() => {
          totalSeconds--;
          
          let minDisplay = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
          let secDisplay = (totalSeconds % 60).toString().padStart(2, '0');
          countdownBox.innerText = `${minDisplay}:${secDisplay}`;
          
          // Khi đếm ngược về 0 -> Tự động bắn lệnh OPEN ra chốt cửa
          if (totalSeconds <= 0) {
            clearInterval(timerInterval);
            countdownBox.style.display = 'none';
            document.getElementById('statusBox').innerText = "⏰ Hết giờ! Đang tự động mở khóa...";
            
            sendRawCommand("OPEN", () => {
              document.getElementById('statusBox').innerText = "✅ Đã tự động mở hộp khi hết giờ!";
              logHistory("HẾT GIỜ TỰ MỞ");
            });
          }
        }, 1000);
      });
    }

    // Tính năng đổi mật khẩu lưu thẳng lên Firebase Cloud
    function changePassword() {
      const newPass = document.getElementById('newPassInput').value;
      if (newPass.length < 4) {
        alert("Mật khẩu mới phải có tối thiểu 4 số!"); return;
      }
      
      const confirmPass = prompt("Nhập mật khẩu Web HIỆN TẠI để xác thực quyền quản trị:");
      if (confirmPass === cloudPassword) {
        fetch(`${DATABASE_URL}/lockbox/password.json?auth=${FIREBASE_SECRET}`, {
          method: 'PUT', body: JSON.stringify(newPass)
        }).then(() => {
          cloudPassword = newPass;
          alert("🎉 Tuyệt vời! Đã cập nhật mật khẩu mới lên Cloud thành công.");
          document.getElementById('newPassInput').value = "";
        });
      } else {
        alert("❌ Xác thực thất bại! Sai mật khẩu hiện tại.");
      }
    }

    // Quản lý Nhật ký lịch sử
    function logHistory(actionText) {
      const now = new Date();
      const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} - ${now.getDate()}/${now.getMonth()+1}`;

      fetch(`${DATABASE_URL}/lockbox/history.json?auth=${FIREBASE_SECRET}`, {
        method: 'POST', body: JSON.stringify({ action: actionText, time: timeStr })
      }).then(loadHistory);
    }

    function loadHistory() {
      fetch(`${DATABASE_URL}/lockbox/history.json?auth=${FIREBASE_SECRET}`)
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('historyList'); list.innerHTML = '';
        if (data) {
          const logs = Object.values(data).reverse().slice(0, 8); // Hiện 8 dòng gần nhất
          logs.forEach(log => {
            let color = "var(--danger)";
            if(log.action.includes("MỞ")) color = "var(--primary)";
            if(log.action.includes("HẸN")) color = "var(--warning)";
            list.innerHTML += `<li><span style="color: ${color}; font-weight: bold;">${log.action}</span> | Giờ: ${log.time}</li>`;
          });
        } else {
          list.innerHTML = '<li>Chưa có nhật ký hoạt động nào.</li>';
        }
      });
    }
  </script>
</body>
</html>
